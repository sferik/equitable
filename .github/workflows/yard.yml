name: Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Generate YARD documentation
        run: bundle exec rake yard
      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: yard-docs
          path: doc/
          retention-days: 7
